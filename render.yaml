databases:
  - name: checklist-veiculos-db
    plan: free
    databaseName: checklist_veiculos

services:
  - type: web
    name: checklist-veiculos
    runtime: python
    plan: free
    buildCommand: chmod +x build.sh && ./build.sh
    startCommand: cd backend && gunicorn main:app -w 2 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: checklist-veiculos-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: NODE_VERSION
        value: "20"
